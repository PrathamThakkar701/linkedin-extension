<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncUp Candidates Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="logo">
            <i class="fa-solid fa-bolt"></i>
            <h2>SyncUp</h2>
        </div>
        <div class="api-key-container">
            <div class="input-group">
                <i class="fa-solid fa-key icon-muted"></i>
                <input type="password" id="api-key-input" value="syncup-dev-key" placeholder="API Key">
                <button id="toggle-key-visibility" aria-label="Toggle API Key visibility">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <div>
                <h1>Candidates</h1>
                <p class="subtitle" id="candidate-count-display">Loading...</p>
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <i class="fa-solid fa-search icon-muted"></i>
                    <input type="text" id="search-input" placeholder="Search...">
                </div>
                <button class="btn btn-outline" id="refresh-btn">
                    <i class="fa-solid fa-rotate-right"></i> Refresh
                </button>
            </div>
        </header>

        <!-- Error State -->
        <div id="error-container" class="hidden error-panel">
            <i class="fa-solid fa-circle-exclamation"></i>
            <div>
                <h3 id="error-title">Error</h3>
                <p id="error-message">Message</p>
            </div>
        </div>

        <!-- Manual Sourcing Panel -->
        <div class="sourcing-panel">
            <h3><i class="fa-solid fa-magnifying-glass"></i> Manual Sourcing</h3>
            <p class="text-muted text-small" style="margin-bottom: 12px;">Find a candidate's LinkedIn URL by name and company</p>
            <div class="sourcing-form">
                <input type="text" id="source-name" placeholder="Candidate Name (e.g. John Doe)" required>
                <input type="text" id="source-company" placeholder="Company (e.g. Google)">
                <button id="source-find-btn" class="btn btn-primary">Find LinkedIn</button>
            </div>
            <div id="source-result" class="hidden" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                <p style="margin-bottom: 10px;"><strong>Match Found:</strong> <a href="#" id="source-link" target="_blank" style="color: var(--primary-color);">LinkedIn Profile</a></p>
                <div class="source-actions" style="display: flex; gap: 10px;">
                    <button id="source-enrich-btn" class="btn btn-outline" style="color: #0d9488; border-color: #0d9488;">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Auto-Save via RapidAPI
                    </button>
                    <a href="#" id="source-open-btn" class="btn btn-outline" target="_blank">
                        <i class="fa-solid fa-up-right-from-square"></i> Open Profile
                    </a>
                </div>
            </div>
        </div>

        <!-- Candidates List -->
        <div class="table-container">
            <table class="candidates-table">
                <thead>
                    <tr>
                        <th>Candidate</th>
                        <th>Headline</th>
                        <th>Location</th>
                        <th>Latest Role</th>
                        <th>Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="candidates-list">
                    <!-- List rows injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Candidate Detail Modal -->
    <div id="candidate-modal" class="modal hidden">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header">
                <img id="modal-photo" src="" alt="Avatar" class="modal-avatar">
                <div class="modal-title-group">
                    <h2 id="modal-name">Candidate Name</h2>
                    <p id="modal-headline" class="text-muted">Headline</p>
                    <p id="modal-location" class="text-small"><i class="fa-solid fa-location-dot"></i> <span>Location</span></p>
                    <div id="modal-contact-info" class="contact-info hidden" style="margin-top: 10px; font-size: 14px; color: #003366;">
                        <p><i class="fa-solid fa-envelope"></i> <span id="modal-email"></span></p>
                        <p><i class="fa-solid fa-phone"></i> <span id="modal-phone"></span></p>
                    </div>
                    <button id="fetch-contact-btn" class="btn btn-outline" style="margin-top: 10px;">
                        <i class="fa-solid fa-address-book"></i> Fetch Contact Info
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <div class="section">
                    <h3>Experience</h3>
                    <div id="modal-experience" class="exp-list"></div>
                </div>
                <div class="section">
                    <h3>Raw Data</h3>
                    <pre id="modal-raw" class="raw-data-block"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
